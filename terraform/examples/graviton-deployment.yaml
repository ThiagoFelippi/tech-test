apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-graviton
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-graviton
  template:
    metadata:
      labels:
        app: nginx-graviton
    spec:
      nodeSelector:
        kubernetes.io/arch: arm64
      containers:
        - name: nginx
          image: public.ecr.aws/nginx/nginx:latest
          resources:
            requests:
              cpu: "500m"
              memory: "128Mi"
